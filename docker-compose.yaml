version: "3.8"

services:
  db:
    image: docker.io/library/postgres:15-alpine
    networks:
      - snip-network
    environment:
      POSTGRES_USER: snip_user
      POSTGRES_PASSWORD: snip_password
      POSTGRES_DB: snip_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snip_user -d snip_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: docker.io/library/redis:7-alpine
    networks:
      - snip-network
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    networks:
      - snip-network
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://snip_user:snip_password@db:5432/snip_db
      - REDIS_URL=redis://redis:6379/
      - RUST_LOG=info,tower_http=debug
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:

networks:
  snip-network:
    driver: bridge
